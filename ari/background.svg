      <stop offset="18%" stop-color="#8f9498" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#8f9498" stop-opacity="0.62"/>
      <stop offset="82%" stop-color="#8f9498" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8f9498" stop-opacity="0"/>
    </linearGradient>
    <mask id="center-band-mask">
