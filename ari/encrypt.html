<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Puzzle Crypto Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }

    textarea,
    input,
    button {
      font: inherit;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      box-sizing: border-box;
      margin: 0.5rem 0 1rem;
      padding: 0.75rem;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      margin: 0.5rem 0 1rem;
    }

    button {
      padding: 0.6rem 1rem;
      margin-right: 0.5rem;
      cursor: pointer;
    }

    .row {
      margin-bottom: 1.5rem;
    }

    .status {
      margin-top: 1rem;
      font-weight: 600;
    }

    .ok {
      color: #087f23;
    }

    .error {
      color: #b00020;
    }

    .hint {
      color: #555;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <h1>Puzzle Crypto Tool</h1>

  <p>
    Use this page to encrypt puzzle solutions and decrypt them again with the correct key.
    The output ciphertext is safe to paste into your static puzzle files.
  </p>

  <div class="row">
    <label for="key"><strong>Key</strong></label>
    <input id="key" type="password" placeholder="Enter encryption/decryption key">
  </div>

  <div class="row">
    <label for="input"><strong>Input</strong></label>
    <textarea id="input" placeholder="Plaintext for encryption, or ciphertext for decryption"></textarea>

    <button id="encryptButton">Encrypt</button>
    <button id="decryptButton">Decrypt</button>
    <button id="copyButton">Copy output</button>

    <p class="hint">
      Tip: You can paste JSON produced by <code>JSON.stringify(...)</code> as plaintext.
    </p>
  </div>

  <div class="row">
    <label for="output"><strong>Output</strong></label>
    <textarea id="output" readonly placeholder="Result will appear here"></textarea>
  </div>

  <div id="status" class="status"></div>

  <script src="crypto-puzzle.js"></script>

  <script>
    const keyInput = document.getElementById("key");
    const inputArea = document.getElementById("input");
    const outputArea = document.getElementById("output");
    const statusBox = document.getElementById("status");

    const encryptButton = document.getElementById("encryptButton");
    const decryptButton = document.getElementById("decryptButton");
    const copyButton = document.getElementById("copyButton");

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status " + type;
    }

    function getKeyOrWarn() {
      const key = keyInput.value;

      if (!key) {
        setStatus("Please enter a key.", "error");
        return null;
      }

      return key;
    }

    encryptButton.addEventListener("click", async () => {
      const key = getKeyOrWarn();
      if (key === null) return;

      const plaintext = inputArea.value;

      try {
        const encrypted = await PuzzleCrypto.encryptString(key, plaintext);
        outputArea.value = encrypted;
        setStatus("Encrypted successfully.", "ok");
      } catch (error) {
        console.error(error);
        setStatus("Encryption failed.", "error");
      }
    });

    decryptButton.addEventListener("click", async () => {
      const key = getKeyOrWarn();
      if (key === null) return;

      const ciphertext = inputArea.value.trim();

      const decrypted = await PuzzleCrypto.decryptString(key, ciphertext);

      if (decrypted === null) {
        outputArea.value = "";
        setStatus("Decryption failed. The key may be wrong, or the ciphertext may be invalid.", "error");
      } else {
        outputArea.value = decrypted;
        setStatus("Decrypted successfully.", "ok");
      }
    });

    copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputArea.value);
        setStatus("Output copied to clipboard.", "ok");
      } catch {
        setStatus("Could not copy output. Please copy it manually.", "error");
      }
    });
  </script>
</body>
</html>
